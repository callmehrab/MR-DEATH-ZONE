<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to the Darkness</title>
  <style>
    body {
      background-image: url('https://i.imgur.com/3ZQ3Z5L.jpg'); /* تصویر تاریک دلخواه */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: #00ff00;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.2em;
      padding: 40px;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #terminal {
      background-color: rgba(0, 0, 0, 0.7);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ff00;
      white-space: pre-wrap;
      max-width: 800px;
    }
    .blinking-cursor {
      display: inline-block;
      width: 10px;
      background-color: #00ff00;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      50% { background-color: transparent; }
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script>
    const lines = [
      "Initializing sequence...",
      "Bypassing firewalls...",
      "Accessing hidden layers...",
      "Decrypting shadows...",
      "Welcome to the realm of darkness..."
    ];

    const terminal = document.getElementById("terminal");
    let lineIndex = 0;
    let charIndex = 0;

    function typeLine() {
      if (lineIndex < lines.length) {
        const currentLine = lines[lineIndex];
        if (charIndex < currentLine.length) {
          terminal.textContent += currentLine.charAt(charIndex);
          charIndex++;
          setTimeout(typeLine, 50);
        } else {
          terminal.textContent += "\n";
          charIndex = 0;
          lineIndex++;
          setTimeout(typeLine, 500);
        }
      } else {
        const cursor = document.createElement("span");
        cursor.className = "blinking-cursor";
        terminal.appendChild(cursor);
      }
    }

    typeLine();
  </script>
</body>
</html>
